<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <title>طبيبك</title>

    <!-- Links -->
     <link rel="icon" href="icon.png">
    <!-- Style links -->
     <link rel="stylesheet" href="Style/style.css">
     <link rel="manifest" href="Script/manifest.json">
    <!-- Script links -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>
    <!-- header -->
    <header>

    </header>

    <!-- decoment -->
    <div class="decoment">
        <a class="text">مرحبا بك في طبيبك</a>
        <div class="searsh">
            <div class="flex">
                <button class="de-btn x-btn"><ion-icon name="options-outline"></ion-icon></button>
                <input id="" type="text" placeholder="إبحث بالنص او بالقسم...">
                <button class="de-btn"><ion-icon name="search-outline"></ion-icon></button>
            </div>
            
            <!-- -- -->
            <div class="results"></div>
        </div>
    </div>



    <script>
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js');
        }
    </script>

    <script>
let deferredPrompt;

// 🔥 تحقق ذكي إذا التطبيق يعمل كوضع تطبيق
if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
  localStorage.setItem("appInstalled", "true");
}

// تحقق إذا كان التطبيق مثبت مسبقًا
const isInstalled = localStorage.getItem("appInstalled") === "true";

// إذا مثبت لا نسوي شيء
if (!isInstalled) {

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    showInstallMessage();
  });

}

function showInstallMessage() {
  // لا تكرر الزر
  if (document.querySelector(".Download-app")) return;

  const installBtn = document.createElement("button");
  installBtn.innerText = "تثبيت التطبيق";
  installBtn.className = "Download-app";

  document.body.appendChild(installBtn);

  installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();

    const result = await deferredPrompt.userChoice;

    if (result.outcome === 'accepted') {
      console.log("تم التثبيت");
    } else {
      console.log("تم الرفض");
    }

    deferredPrompt = null;
  });
}

// عند تثبيت التطبيق فعليًا
window.addEventListener('appinstalled', () => {
  console.log("تم تثبيت التطبيق");

  // خزّن الحالة
  localStorage.setItem("appInstalled", "true");

  // احذف الزر إذا موجود
  const btn = document.querySelector(".Download-app");
  if (btn) btn.remove();
});
</script>

    <script src="Script/script.js"></script>
</body>
</html>
