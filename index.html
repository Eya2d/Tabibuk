<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طبيبك</title>

    <!-- Links -->
     <link rel="icon" href="icon.png">
    <!-- Style links -->
     <link rel="stylesheet" href="Style/style.css">
     <link rel="manifest" href="Script/manifest.json">
    <!-- Script links -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>
    <!-- header -->
    <header>

    </header>

    <!-- decoment -->
    <div class="decoment">
        <a class="text">مرحبا بك في طبيبك</a>
        <div class="searsh">
            <div class="flex">
                <button class="de-btn x-btn"><ion-icon name="options-outline"></ion-icon></button>
                <input id="" type="text" placeholder="إبحث بالنص او بالقسم...">
                <button class="de-btn"><ion-icon name="search-outline"></ion-icon></button>
            </div>
            
            <!-- -- -->
            <div class="results"></div>
        </div>
    </div>



    <script>
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js');
        }
    </script>

    <script>
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
          // منع الظهور التلقائي
          e.preventDefault();
        
          // حفظ الحدث
          deferredPrompt = e;
        
          // يمكنك إظهار زر أو إشعار للمستخدم هنا
          showInstallMessage();
        });

        function showInstallMessage() {
          const installBtn = document.createElement("button");
          installBtn.innerText = "تثبيت التطبيق";
          installBtn.className = "Download-app";
        
          document.body.appendChild(installBtn);
        
          installBtn.addEventListener("click", async () => {
            if (!deferredPrompt) return;
        
            deferredPrompt.prompt(); // 👈 هنا تظهر الرسالة الافتراضية
        
            const result = await deferredPrompt.userChoice;
        
            if (result.outcome === 'accepted') {
              console.log("تم التثبيت");
            } else {
              console.log("تم الرفض");
            }
        
            deferredPrompt = null;
          });
        }
    </script>


    <script src="Script/script.js"></script>
</body>
</html>
