<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <meta name="theme-color" content="#e0d9be2b" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)"> -->
    <title>طبيبك</title>

    <!-- Links -->
     <link rel="icon" href="icon.png">
    <!-- Style links -->
     <link rel="stylesheet" href="Style/style.css">
     <link rel="manifest" href="Script/manifest.json">
    <!-- Script links -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>
    <!-- header -->
    <header>

    </header>

    <!-- decoment -->
    <div class="decoment">
        <a class="text">مرحبا بك في طبيبك</a>
        <div class="searsh">
            <div class="flex">
                <button class="de-btn x-btn"><ion-icon name="options-outline"></ion-icon></button>
                <input id="" type="text" placeholder="إبحث بالنص او بالقسم...">
                <button class="de-btn"><ion-icon name="search-outline"></ion-icon></button>
            </div>
            
            <!-- -- -->
            <div class="results"></div>
        </div>
    </div>



    <script>
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js');
        }
    </script>

    <script>
        if (window.matchMedia('(display-mode: standalone)').matches) {
          document.body.style.overflowY = "hidden";
        } else {
          document.body.style.overflowY = "auto";
        }
    </script>

    <script>
    let deferredPrompt;
        
    // ✅ التحقق هل التطبيق مثبت مسبقًا
    function isAppInstalled() {
      return window.matchMedia('(display-mode: standalone)').matches 
             || window.navigator.standalone === true;
    }
    
    // ✅ إظهار زر التثبيت فقط إذا غير مثبت
    function showInstallMessage() {
      // إذا مثبت → لا تظهر الزر
      if (isAppInstalled()) return;
    
      // إذا سبق ضغط تثبيت ونجح → لا تظهر
      if (localStorage.getItem("appInstalled") === "true") return;
    
      // منع تكرار الزر
      if (document.querySelector(".Download-app")) return;
    
      const installBtn = document.createElement("button");
      installBtn.innerText = "تثبيت التطبيق";
      installBtn.className = "Download-app";
    
      document.body.appendChild(installBtn);
    
      installBtn.addEventListener("click", async () => {
        if (!deferredPrompt) return;
    
        deferredPrompt.prompt();
    
        const result = await deferredPrompt.userChoice;
    
        if (result.outcome === 'accepted') {
          console.log("تم التثبيت");
        
          // ✅ حفظ أنه تم التثبيت
          localStorage.setItem("appInstalled", "true");
        
          // ❌ حذف الزر
          installBtn.remove();
        } else {
          console.log("تم الرفض");
        }
    
        deferredPrompt = null;
      });
    }
    
    // ✅ حدث جاهزية التثبيت
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    
      showInstallMessage();
    });
    
    // ✅ عند التثبيت الفعلي (مهم جداً)
    window.addEventListener('appinstalled', () => {
      console.log("تم تثبيت التطبيق فعليًا");
    
      localStorage.setItem("appInstalled", "true");
    
      const btn = document.querySelector(".Download-app");
      if (btn) btn.remove();
    });
    
    // ✅ عند تحميل الصفحة
    window.addEventListener("load", () => {
      if (!isAppInstalled()) {
        // إذا غير مثبت → ننتظر beforeinstallprompt
        console.log("التطبيق غير مثبت");
      } else {
        console.log("التطبيق مثبت");
      }
    });
</script>

    <script src="Script/script.js"></script>
</body>
</html>
