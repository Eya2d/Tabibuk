<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طبيبك</title>

    <!-- Links -->
     <link rel="icon" href="icon.png">
    <!-- Style links -->
     <link rel="stylesheet" href="Style/style.css">
     <link rel="manifest" href="Script/manifest.json">
    <!-- Script links -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>
    <!-- header -->
    <header>

    </header>

    <!-- decoment -->
    <div class="decoment">
        <a class="text">مرحبا بك في طبيبك</a>
        <div class="searsh">
            <div class="flex">
                <button class="de-btn x-btn"><ion-icon name="options-outline"></ion-icon></button>
                <input id="" type="text" placeholder="إبحث بالنص او بالقسم...">
                <button class="de-btn"><ion-icon name="search-outline"></ion-icon></button>
            </div>
            
            <!-- -- -->
            <div class="results"></div>
        </div>
    </div>



    <script>
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js');
        }
    </script>

    <script>
let deferredPrompt;

// ✅ دالة للتحقق هل التطبيق يعمل كوضع تطبيق (مثبت)
function isAppInstalled() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

// ✅ عند تحميل الصفحة
window.addEventListener('load', () => {
  // إذا التطبيق مثبت → لا تظهر الزر
  if (isAppInstalled()) {
    console.log("التطبيق مثبت بالفعل");
    return;
  }

  // إذا المستخدم ثبت التطبيق سابقًا (حفظناها)
  if (localStorage.getItem("appInstalled") === "true") {
    return;
  }
});

// ✅ التقاط حدث التثبيت
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();

  // إذا مثبت لا تفعل شيء
  if (isAppInstalled()) return;

  deferredPrompt = e;
  showInstallMessage();
});

function showInstallMessage() {
  // لا تنشئ الزر إذا موجود
  if (document.querySelector(".Download-app")) return;

  const installBtn = document.createElement("button");
  installBtn.innerText = "تثبيت التطبيق";
  installBtn.className = "Download-app";

  document.body.appendChild(installBtn);

  installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();

    const result = await deferredPrompt.userChoice;

    if (result.outcome === 'accepted') {
      console.log("تم التثبيت");

      // ✅ حفظ أن التطبيق تم تثبيته
      localStorage.setItem("appInstalled", "true");

      // ❌ حذف الزر
      installBtn.remove();
    } else {
      console.log("تم الرفض");
    }

    deferredPrompt = null;
  });
}

// ✅ عند تثبيت التطبيق فعليًا
window.addEventListener('appinstalled', () => {
  console.log("تم تثبيت التطبيق فعليًا");

  // حفظ الحالة
  localStorage.setItem("appInstalled", "true");

  // حذف الزر إذا موجود
  const btn = document.querySelector(".Download-app");
  if (btn) btn.remove();
});
</script>

    <script src="Script/script.js"></script>
</body>
</html>
