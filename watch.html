<html lang="ar" dir="rtl"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VidHub – مشاهدة</title>
  <link rel="stylesheet" href="Style/body.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&amp;display=swap" rel="stylesheet">
  <style>
    :root {
    --bg: #0a0a0f;
    --surface: #13131a00;
    /* --card: #1a1a24; */
    --border: #b8b8ba;
    --accent: #e63946;
    --accent2: #ff6b6b;
    --gold: #f4a261;
    /* --text: #f0f0f5; */
    --muted: #8888aa;
    --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf9f4;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ===== HEADER ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #faf9f4;
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 900;
      color: var(--text);
      text-decoration: none;
      flex-shrink: 0;
    }
    .logo span { color: orange; }

    .nav-links {
      display: flex;
      gap: 8px;
      margin-right: auto;
    }

    .nav-btn {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: 30px;
      transition: all .2s;
      direction: ltr;
    }
    .nav-btn:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    /* ===== LAYOUT ===== */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 32px;
      align-items: start;
    }

    /* ===== VIDEO COLUMN ===== */
    .video-col {}

    /* ===== PLAYER ===== */
    .player-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
      /* box-shadow: 0 20px 60px rgba(0,0,0,.6); */
    }
    .player-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-meta {
      margin-top: 20px;
    }

    .video-title {
      font-size: 1.3rem;
      font-weight: 800;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 10px;
    }

    .video-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .badge.cat { 
      border-color: #ff8b00;
      color: #ff8b00;
     }

    /* ===== SIDEBAR ===== */
    .sidebar {}

    .sidebar-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .suggested-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sugg-card {
      display: flex;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid #0000;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color .2s, transform .15s;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .sugg-card:hover {
      /* border-color: rgba(255, 145, 0, 0.74); */
      transform: translateX(-3px);
    }

    .sugg-thumb {
      height: 73px;
      width: 130px;
      flex-shrink: 0;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    border-radius: 10px;
    }

    .sugg-info {
      flex: 1;
      padding: 10px 0px 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .sugg-title {
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .sugg-cat {
      font-size: 0.68rem;
      color: #ff8b00;
      font-weight: 700;
    }

    /* Loading state */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        padding: 16px;
      }
      header { padding: 12px 16px; }
      .logo { font-size: 1.3rem; }
      .video-title { font-size: 1.1rem; }
      .sugg-thumb { width: 110px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html"><span>طـ</span>بيبك</a>
  <div class="nav-links">
    <a class="nav-btn" id="back-section" href="section.html?cat=%D8%A8%D8%B4%D8%B1%D8%A9">← القسم</a>
    <a class="nav-btn" href="index.html" style="
    background: orange;
    color: #fff;
    border-color: #0000;
">الرئيسية</a>
  </div>
</header>

<main>

  <!-- VIDEO COLUMN -->
  <div class="video-col">

    <!-- PLAYER -->
    <div class="player-wrap">
      <iframe
        id="yt-player"
        src=""
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>

    <!-- META -->
    <div class="video-meta">
      <h1 class="video-title" id="video-title">تحميل...</h1>
      <div class="video-badges">
        <span class="badge cat" id="video-cat">—</span>
        <span class="badge" id="video-id-badge">—</span>
      </div>
    </div>

  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">مقترحات من نفس القسم</div>
    <div class="suggested-list" id="suggested-list">
      <div class="loading-state">⏳ جاري التحميل...</div>
    </div>
  </aside>

</main>

<script src="Script/app.js"></script>
<script src="Script/data.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const videoId = params.get('id');
  const cat     = params.get('cat') || 'شائعة';
 
  const player   = document.getElementById('yt-player');
  const titleEl  = document.getElementById('video-title');
  const catEl    = document.getElementById('video-cat');
  const idBadge  = document.getElementById('video-id-badge');
  const backBtn  = document.getElementById('back-section');
  const suggList = document.getElementById('suggested-list');
 
  backBtn.href = `section.html?cat=${encodeURIComponent(cat)}`;
  catEl.textContent  = cat;
  idBadge.textContent = videoId || '—';
 
  if (!videoId) {
    titleEl.textContent = 'فيديو غير موجود';
  } else {
    player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
 
    // ===== جلب عنوان الفيديو الحالي =====
    fetchVideoTitle(videoId).then(title => {
      titleEl.textContent = title;
      // حفظ في التاريخ مع العنوان الصحيح
      const current = DATA[cat]?.find(v => v.id === videoId) || { id: videoId, category: cat };
      addToWatchHistory({ ...current, title });
    });
 
    // ===== الفيديوهات المقترحة =====
    const rawPool = (DATA[cat] || []).filter(v => v.id !== videoId).slice(0, 10);
 
    // ارسم الهيكل فوراً مع العناوين المخزّنة
    function renderSugg(list) {
      if (!list.length) {
        suggList.innerHTML = '<p style="color:var(--muted);font-size:.85rem;padding:20px 0">لا توجد مقترحات</p>';
        return;
      }
      suggList.innerHTML = list.map((v, i) => `
        <a class="sugg-card"
           href="watch.html?id=${v.id}&cat=${encodeURIComponent(v.category)}"
           style="animation-delay:${i * 50}ms"
           onclick="addToWatchHistory(${JSON.stringify(v).replace(/"/g,'&quot;')})">
          <img class="sugg-thumb" src="${getYoutubeThumbnail(v.id)}" alt="${v.title}" loading="lazy" />
          <div class="sugg-info">
            <div class="sugg-title" id="st-${v.id}">${v.title}</div>
            <span class="sugg-cat">${v.category}</span>
          </div>
        </a>
      `).join('');
    }
 
    renderSugg(rawPool);
 
    // جلب العناوين الحقيقية ثم تحديث الكروت
    enrichVideos(rawPool).then(enriched => {
      enriched.forEach(v => {
        const el = document.getElementById('st-' + v.id);
        if (el) el.textContent = v.title;
      });
    });
  }
</script>


</body>
</html>
